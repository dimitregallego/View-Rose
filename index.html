<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>Isovist — Giraffe App</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;background:#0f1117;overflow:hidden}
    .app{font-family:'Hind',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;font-size:13px;line-height:1.5}
    .hdr{display:flex;align-items:center;gap:10px;padding:11px 14px 9px;border-bottom:1px solid #1e2433;background:#0a0d14;flex-shrink:0}
    .hdr-ico{color:#00ACCD;display:flex;align-items:center}
    .hdr-t{font-size:12.5px;font-weight:600;color:#f0f4f8}
    .hdr-sub{font-size:9.5px;color:#3a4560;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
    .controls{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
    .controls::-webkit-scrollbar{width:3px}
    .controls::-webkit-scrollbar-thumb{background:#1e2433;border-radius:2px}
    .btn{width:100%;padding:9px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;border:none}
    .btn-primary{border:1px solid #00ACCD;background:#00ACCD18;color:#00ACCD}
    .btn-primary:hover:not(:disabled){background:#00ACCD30}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-sel{border:1px solid #2DD4BF;background:#2DD4BF12;color:#2DD4BF}
    .btn-sel:hover:not(:disabled){background:#2DD4BF28}
    .btn-cancel{border:1px solid #f59e0b;color:#f59e0b;background:#f59e0b10}
    .btn-clear{border:1px solid #2d3748;background:transparent;color:#718096;padding:7px 12px;font-size:11px}
    .divider{display:flex;align-items:center;gap:8px;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#4a5568;margin-top:3px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e2433}
    .sl-grp{display:flex;flex-direction:column;gap:5px}
    .sl-row{display:flex;justify-content:space-between;align-items:center}
    .sl-lbl{font-size:11.5px;color:#8896a8}
    .sl-val{font-size:11.5px;font-weight:600;color:#00ACCD;font-variant-numeric:tabular-nums}
    .sl-ticks{display:flex;justify-content:space-between;font-size:9px;color:#2d3748}
    input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:#1e2433;border-radius:2px;outline:none;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#00ACCD;border:2px solid #0a0d14}
    .ftr{padding:7px 14px;border-top:1px solid #1e2433;background:#0a0d14;flex-shrink:0}
    .ftr p{font-size:9px;color:#232c3d;text-align:center}

    /* Debug log */
    #debug{background:#0a0d14;border:1px solid #1e2433;border-radius:6px;padding:8px 10px;font-family:monospace;font-size:10px;color:#4ade80;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
    #debug .err{color:#f87171}
    #debug .warn{color:#f59e0b}
    #debug .info{color:#00ACCD}

    .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:p 1.2s infinite}
    @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
import * as turf              from 'https://esm.sh/@turf/turf@6.5.0';

// ─── Debug log visível no app ─────────────────────────────────────────────────
function log(msg, type) {
  const el = document.getElementById('debug');
  if (!el) return;
  const span = document.createElement('span');
  span.className = type || '';
  span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
  console.log(`[Isovist] ${msg}`);
}

// ─── Estado ───────────────────────────────────────────────────────────────────
const LAYER_OUT = 'isovist_view';
let observer = null;
let isListening = false;
let radius = 300;
let cone = 360;
let coneDir = 0;

// ─── Gerar e renderizar a View Rose (sem obstruções) ──────────────────────────
async function renderViewRose(obs) {
  observer = obs;
  log(`Observador: [${obs[0].toFixed(5)}, ${obs[1].toFixed(5)}]`, 'info');

  // 1. Gerar geometria com Turf.js
  const is360 = cone >= 359.9;
  log(`Raio: ${radius}m · Cone: ${is360 ? '360°' : cone + '°'}`, 'info');

  // Faixas de distância
  const bands = [
    { name: 'perto',    dist: Math.min(100, radius),  color: '#00ACCD', opacity: 0.5 },
    { name: 'medio',    dist: Math.min(250, radius),  color: '#2DD4BF', opacity: 0.35 },
    { name: 'distante', dist: radius,                 color: '#64748B', opacity: 0.2 },
  ];

  const obsPoint = turf.point(obs);

  // 2. Gerar buffers concêntricos
  for (let bi = 0; bi < bands.length; bi++) {
    const band = bands[bi];
    log(`Gerando faixa "${band.name}" (${band.dist}m)...`);

    // Buffer = círculo
    let shape = turf.buffer(obsPoint, band.dist / 1000, { units: 'kilometers', steps: 64 });

    // Se não for 360°, intersectar com um setor angular
    if (!is360) {
      const sectorPts = [obs];
      for (let a = coneDir - cone/2; a <= coneDir + cone/2; a += 2) {
        const dest = turf.destination(obs, (band.dist * 1.1) / 1000, a, { units: 'kilometers' });
        sectorPts.push(dest.geometry.coordinates);
      }
      sectorPts.push(obs);
      const sector = turf.polygon([sectorPts]);
      try {
        const clipped = turf.intersect(turf.featureCollection([shape, sector]));
        if (clipped) shape = clipped;
      } catch(e) { log(`Intersect falhou: ${e}`, 'warn'); }
    }

    // Subtrair a faixa anterior (para fazer anel)
    if (bi > 0) {
      const innerCircle = turf.buffer(obsPoint, bands[bi-1].dist / 1000, { units: 'kilometers', steps: 64 });
      try {
        const ring = turf.difference(turf.featureCollection([shape, innerCircle]));
        if (ring) shape = ring;
      } catch(e) { log(`Difference falhou: ${e}`, 'warn'); }
    }

    // 3. Montar FeatureCollection com propriedades de estilo
    shape.properties = {
      fill: band.color,
      'fill-opacity': band.opacity,
      stroke: band.color,
      'stroke-width': 1,
      'stroke-opacity': band.opacity + 0.15,
    };

    const fc = { type: 'FeatureCollection', features: [shape] };
    const layerName = `${LAYER_OUT}_${bi}`;

    log(`Renderizando layer "${layerName}"...`);

    // 4. Tentar múltiplas formas de renderizar
    // Forma A: updateTempLayerGeoJSON (usada com sucesso no GeoSampa app)
    try {
      await rpc.invoke('updateTempLayerGeoJSON', [layerName, fc]);
      log(`  ✓ updateTempLayerGeoJSON OK`, 'info');
      continue;
    } catch(e) {
      log(`  ✗ updateTempLayerGeoJSON: ${e}`, 'warn');
    }

    // Forma B: addTempLayerGeoJSON com estilo fill
    try {
      const style = {
        type: 'fill',
        paint: { 'fill-color': band.color, 'fill-opacity': band.opacity }
      };
      await rpc.invoke('addTempLayerGeoJSON', [layerName, fc, style]);
      log(`  ✓ addTempLayerGeoJSON (fill) OK`, 'info');
      continue;
    } catch(e) {
      log(`  ✗ addTempLayerGeoJSON (fill): ${e}`, 'warn');
    }

    // Forma C: createRawSections (como último recurso)
    try {
      await rpc.invoke('createRawSections', [fc.features]);
      log(`  ✓ createRawSections OK`, 'info');
    } catch(e) {
      log(`  ✗ createRawSections: ${e}`, 'err');
    }
  }

  // 5. Ponto observador
  const obsFC = { type: 'FeatureCollection', features: [turf.point(obs, { color: '#ffffff' })] };
  try {
    await rpc.invoke('updateTempLayerGeoJSON', [`${LAYER_OUT}_obs`, obsFC]);
    log(`✓ Ponto observador renderizado`, 'info');
  } catch(e) {
    log(`Ponto observador: ${e}`, 'warn');
    try {
      await rpc.invoke('addTempLayerGeoJSON', [`${LAYER_OUT}_obs`, obsFC, {
        type: 'circle',
        paint: { 'circle-color': '#fff', 'circle-radius': 6, 'circle-stroke-color': '#000', 'circle-stroke-width': 2 }
      }]);
      log(`  ✓ addTempLayerGeoJSON (circle) OK`, 'info');
    } catch(e2) { log(`  ✗ circle: ${e2}`, 'err'); }
  }

  log(`═══ COMPLETO ═══`, 'info');
}

// ─── Ações ────────────────────────────────────────────────────────────────────
async function fromSelectedBuilding() {
  log('Lendo edifício selecionado...');
  try {
    const result = await rpc.invoke('getSelectedFeatures', []);
    log(`getSelectedFeatures retornou: type=${typeof result}, isArray=${Array.isArray(result)}`, 'info');
    const feats = Array.isArray(result) ? result : (result?.features || []);
    log(`Feições encontradas: ${feats.length}`);
    if (feats.length === 0) { log('ERRO: Nenhum elemento selecionado.', 'err'); return; }
    const feat = feats[0];
    log(`Tipo: ${feat.geometry?.type}, layerId: ${feat.properties?.layerId}`);
    const centroid = turf.centroid(feat).geometry.coordinates;
    await renderViewRose(centroid);
  } catch(e) { log(`ERRO: ${e}`, 'err'); }
}

async function fromMapClick() {
  if (isListening) { isListening = false; updateBtn('idle'); return; }
  isListening = true;
  updateBtn('waiting');
  log('Aguardando clique no mapa (drawPoint)...');
  try {
    const pt = await rpc.invoke('drawPoint', []);
    if (!isListening) return;
    isListening = false;
    if (pt) {
      const coord = Array.isArray(pt) ? pt : [pt.lng ?? pt[0], pt.lat ?? pt[1]];
      log(`drawPoint retornou: [${coord}]`, 'info');
      updateBtn('idle');
      await renderViewRose(coord);
    }
  } catch(e) {
    log(`drawPoint falhou: ${e} — usando mapSelectCoord`, 'warn');
  }
}

async function clearAll() {
  for (let i = 0; i < 3; i++) {
    try { await rpc.invoke('removeTempLayer', [`${LAYER_OUT}_${i}`]); } catch {}
  }
  try { await rpc.invoke('removeTempLayer', [`${LAYER_OUT}_obs`]); } catch {}
  observer = null;
  log('Layers limpos.', 'info');
}

function updateBtn(state) {
  const btn = document.getElementById('btn-point');
  if (state === 'waiting') {
    btn.className = 'btn btn-cancel';
    btn.innerHTML = '<span class="pulse"></span> Clique no mapa...';
  } else {
    btn.className = 'btn btn-primary';
    btn.innerHTML = '◎ Observar de um ponto no mapa';
  }
}

// ─── DOM ──────────────────────────────────────────────────────────────────────
document.getElementById('root').innerHTML = `
<div class="app">
  <header class="hdr">
    <span class="hdr-ico">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
        <path d="M10 10 L18 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
        <path d="M10 10 L17 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
        <path d="M10 10 L14 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
        <path d="M10 10 L5 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M10 10 L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".2"/>
        <path d="M10 10 L5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M10 10 L13 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".45"/>
      </svg>
    </span>
    <div><div class="hdr-t">Isovist / View Rose</div><div class="hdr-sub">Teste de renderização</div></div>
  </header>

  <div class="controls">
    <div class="divider"><span>Ponto de observação</span></div>
    <button class="btn btn-sel" id="btn-sel">⊙ Observar do edifício selecionado</button>
    <button class="btn btn-primary" id="btn-point">◎ Observar de um ponto no mapa</button>
    <button class="btn btn-clear" id="btn-clear">✕ Limpar</button>

    <div class="divider"><span>Parâmetros</span></div>
    <div class="sl-grp">
      <div class="sl-row"><span class="sl-lbl">Raio</span><span class="sl-val" id="lbl-r">300m</span></div>
      <input type="range" id="sl-r" min="50" max="1000" step="25" value="300"/>
    </div>
    <div class="sl-grp">
      <div class="sl-row"><span class="sl-lbl">Cone</span><span class="sl-val" id="lbl-c">360°</span></div>
      <input type="range" id="sl-c" min="10" max="360" step="5" value="360"/>
    </div>

    <div class="divider"><span>Debug log</span></div>
    <div id="debug"></div>
  </div>

  <footer class="ftr"><p>Turf.js · Giraffe iFrame SDK · <strong style="color:#00ACCD">v10-debug</strong></p></footer>
</div>`;

document.getElementById('btn-sel').addEventListener('click', fromSelectedBuilding);
document.getElementById('btn-point').addEventListener('click', fromMapClick);
document.getElementById('btn-clear').addEventListener('click', clearAll);
document.getElementById('sl-r').addEventListener('input', e => {
  radius = +e.target.value;
  document.getElementById('lbl-r').textContent = radius + 'm';
  if (observer) renderViewRose(observer);
});
document.getElementById('sl-c').addEventListener('input', e => {
  cone = +e.target.value;
  document.getElementById('lbl-c').textContent = cone >= 359.9 ? '360°' : cone + '°';
  if (observer) renderViewRose(observer);
});

giraffeState.addListener(['mapSelectCoord'], async () => {
  if (!isListening) return;
  const coord = giraffeState.get('mapSelectCoord');
  if (!coord) return;
  isListening = false;
  updateBtn('idle');
  const geo = Array.isArray(coord) ? coord : [coord.lng, coord.lat];
  log(`mapSelectCoord: [${geo}]`, 'info');
  await renderViewRose(geo);
});

log('App carregado. v10-debug', 'info');
log('Selecione um edifício ou clique num ponto do mapa.', 'info');
</script>
</body>
</html>
