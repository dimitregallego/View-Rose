<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Isovist — Giraffe App</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;background:#0f1117;overflow:hidden}
    .app{font-family:'Hind',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;font-size:13px;line-height:1.5}

    /* Header */
    .hdr{display:flex;align-items:center;gap:10px;padding:11px 14px 9px;border-bottom:1px solid #1e2433;background:#0a0d14;flex-shrink:0}
    .hdr-ico{color:#00ACCD;display:flex;align-items:center}
    .hdr-t{font-size:12.5px;font-weight:600;color:#f0f4f8;letter-spacing:.02em}
    .hdr-sub{font-size:9.5px;color:#3a4560;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

    /* Status */
    .status{display:flex;align-items:center;gap:7px;padding:6px 14px;font-size:11.5px;font-weight:500;flex-shrink:0;border-bottom:1px solid transparent}
    .status.hidden{display:none}
    .status.waiting{background:#0e1f2e;color:#00ACCD;border-color:#0d3050}
    .status.compute{background:#0e1e14;color:#4ade80;border-color:#0d3020}
    .status.done{background:#0b1a12;color:#4ade80;border-color:#0d2810}
    .status.error{background:#1e0e0e;color:#f87171;border-color:#3a1010}

    /* Observer card */
    .obs-card{display:none;justify-content:space-between;align-items:center;padding:5px 14px;background:#0d1521;border-bottom:1px solid #1e2433;flex-shrink:0}
    .obs-card.visible{display:flex}
    .obs-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:#3a4560}
    .obs-val{font-size:10.5px;color:#00ACCD;font-family:monospace}

    /* Controls */
    .controls{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
    .controls::-webkit-scrollbar{width:3px}
    .controls::-webkit-scrollbar-thumb{background:#1e2433;border-radius:2px}

    /* Buttons */
    .btn{width:100%;padding:9px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s;letter-spacing:.01em;border:none}
    .btn-primary{border:1px solid #00ACCD;background:#00ACCD18;color:#00ACCD}
    .btn-primary:hover:not(:disabled){background:#00ACCD30}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed}
    .btn-sel{border:1px solid #2DD4BF;background:#2DD4BF12;color:#2DD4BF}
    .btn-sel:hover:not(:disabled){background:#2DD4BF28}
    .btn-sel:disabled{opacity:.4;cursor:not-allowed}
    .btn-cancel{border:1px solid #f59e0b;color:#f59e0b;background:#f59e0b10}
    .btn-cancel:hover{background:#f59e0b22}
    .btn-clear{border:1px solid #2d3748;background:transparent;color:#718096}
    .btn-clear:hover{background:#1e2433;color:#a0aec0}
    .btn-sm{padding:6px 10px;font-size:11px}

    /* Divider */
    .divider{display:flex;align-items:center;gap:8px;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#4a5568;margin-top:3px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e2433}

    /* Info box */
    .info-box{background:#141921;border:1px solid #1e2433;border-radius:6px;padding:9px 11px;display:flex;flex-direction:column;gap:6px}
    .info-row{display:flex;align-items:center;gap:6px;font-size:11px}
    .info-lbl{color:#4a5568;flex-shrink:0}
    .info-val{color:#c0ccd8;font-weight:500}
    .info-val.accent{color:#00ACCD}
    .badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}
    .badge-ok{background:#0b1a12;color:#4ade80;border:1px solid #0d2810}
    .badge-warn{background:#1a1200;color:#f59e0b;border:1px solid #3a2800}

    /* Sliders */
    .sl-grp{display:flex;flex-direction:column;gap:5px}
    .sl-row{display:flex;justify-content:space-between;align-items:center}
    .sl-lbl{font-size:11.5px;color:#8896a8}
    .sl-val{font-size:11.5px;font-weight:600;color:#00ACCD;font-variant-numeric:tabular-nums}
    .sl-ticks{display:flex;justify-content:space-between;font-size:9px;color:#2d3748}
    input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:#1e2433;border-radius:2px;outline:none;cursor:pointer}
    input[type=range].thin{height:2px}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#00ACCD;border:2px solid #0a0d14}
    input[type=range].thin::-webkit-slider-thumb{width:11px;height:11px}
    input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#00ACCD;border:2px solid #0a0d14}

    /* Band cards */
    .band-card{background:#141921;border:1px solid #1e2433;border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
    .band-hdr{display:flex;align-items:center;gap:8px}
    .swatch{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
    .band-name{flex:1;font-size:11.5px;font-weight:500;color:#c0ccd8}
    input[type=color]{width:24px;height:18px;padding:1px;border:1px solid #2d3748;border-radius:3px;background:#0f1117;cursor:pointer}
    .bmeta{font-size:10px;color:#3a4560;white-space:nowrap}
    .brow{display:flex;align-items:center;gap:6px}
    input[type=number]{width:58px;padding:2px 6px;background:#0f1117;border:1px solid #1e2433;border-radius:4px;color:#8896a8;font-size:11.5px;text-align:right;font-variant-numeric:tabular-nums}
    input[type=number]:disabled{opacity:.35;cursor:not-allowed}
    input[type=number]:focus{outline:none;border-color:#00ACCD60}

    /* Footer */
    .ftr{padding:7px 14px;border-top:1px solid #1e2433;background:#0a0d14;flex-shrink:0}
    .ftr p{font-size:9px;color:#232c3d;text-align:center;letter-spacing:.03em}

    .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:currentColor;animation:p 1.2s infinite}
    @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
    .spinner{display:inline-block;width:10px;height:10px;border:1.5px solid #4ade8040;border-top-color:#4ade80;border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { giraffeState, rpc } from 'https://esm.sh/@gi-nx/iframe-sdk@latest';
import * as turf              from 'https://esm.sh/@turf/turf@6.5.0';

// ─── Constantes ───────────────────────────────────────────────────────────────
const LAYER_OUT = 'isovist';
const RAY_STEP  = 2;

// ─── Estado ───────────────────────────────────────────────────────────────────
const S = {
  status: 'idle', statusMsg: '',
  observer: null,          // [lng, lat]
  observerLabel: '',       // 'Edifício selecionado' ou 'Ponto no mapa'
  observerFeatureId: null, // id do edifício selecionado (para excluir do raycasting)
  radius: 300, cone: 360, coneDir: 0,
  bands: [
    { label: 'Próximo',  dist: 100, color: '#00ACCD', opacity: 0.55 },
    { label: 'Médio',    dist: 250, color: '#2DD4BF', opacity: 0.40 },
    { label: 'Distante', dist: 500, color: '#64748B', opacity: 0.25 },
  ],
  rayCount: 0, computeMs: null, obstacleCount: 0,
};
let isListening = false, debounce = null;

// ─── Obter TODOS os polígonos de TODOS os layers via rawSections ──────────────
// Isso é instantâneo (já na memória) e captura tudo: terreno, entorno, edifícios próprios.
function getAllObstacles(excludeFeatureId) {
  const raw = giraffeState.get('rawSections') || [];
  return raw.filter(f => {
    // Só polígonos
    const geomType = f.geometry?.type;
    if (geomType !== 'Polygon' && geomType !== 'MultiPolygon') return false;
    // Exclui layers de saída do próprio isovist
    const lid = f?.properties?.layerId || '';
    if (lid.startsWith(LAYER_OUT)) return false;
    // Exclui o edifício selecionado como observador (se aplicável)
    if (excludeFeatureId && f?.properties?.id === excludeFeatureId) return false;
    return true;
  });
}

// ─── Geometry helpers ─────────────────────────────────────────────────────────
function castRay(angleDeg, maxD, segs) {
  const rad = angleDeg * Math.PI / 180;
  const dx = Math.cos(rad), dy = Math.sin(rad);
  let minT = 1;
  for (const [ax, ay, bx, by] of segs) {
    const sx = bx-ax, sy = by-ay;
    const denom = dx*maxD*sy - dy*maxD*sx;
    if (Math.abs(denom) < 1e-10) continue;
    const t = (ax*sy - ay*sx) / denom;
    const u = (ax*dy*maxD - ay*dx*maxD) / denom;
    if (t >= 0 && t < minT && u >= 0 && u <= 1) minT = t;
  }
  return [dx*maxD*minT, dy*maxD*minT];
}

function extractSegs(projPolys, searchR) {
  const segs = [], r2 = searchR*searchR;
  for (const rings of projPolys) {
    for (const ring of rings) {
      for (let i = 0; i < ring.length-1; i++) {
        const [ax,ay] = ring[i], [bx,by] = ring[i+1];
        if (ax*ax+ay*ay > r2*4 && bx*bx+by*by > r2*4) continue;
        segs.push([ax,ay,bx,by]);
      }
    }
  }
  return segs;
}

// ─── Cálculo principal ────────────────────────────────────────────────────────
async function computeIsovist() {
  const obs = S.observer;
  if (!obs) return;

  setStatus('compute', 'Coletando obstáculos de todos os layers...');

  // 1. Coleta TODOS os polígonos de todos os layers (instantâneo, via rawSections)
  const obstacles = getAllObstacles(S.observerFeatureId);
  S.obstacleCount = obstacles.length;

  setStatus('compute', `${obstacles.length} obstáculos encontrados. Projetando...`);

  // 2. Coletar coordenadas geográficas de todos os obstáculos
  const allGeo = [];
  const meta   = [];
  for (const f of obstacles) {
    const rings = f.geometry.type === 'Polygon'
      ? f.geometry.coordinates
      : f.geometry.coordinates.flat();
    let total = 0;
    for (const ring of rings)
      for (const c of ring) { allGeo.push([c[0], c[1]]); total++; }
    meta.push({ rings, total });
  }

  // 3. toProjected — batch: observador + todos os vértices dos obstáculos
  //    Se não houver obstáculos, passa o próprio observador como placeholder
  const coordsToProject = allGeo.length > 0 ? allGeo : [obs];
  let proj;
  try {
    proj = await rpc.invoke('toProjected', [obs, coordsToProject]);
  } catch(e) {
    setStatus('error', 'Erro ao projetar coordenadas: ' + e);
    return;
  }
  const origin  = proj.origin;
  const projPts = proj.points;
  const px = p => Array.isArray(p) ? p[0] : (p?.x ?? 0);
  const py = p => Array.isArray(p) ? p[1] : (p?.y ?? 0);
  const ox = px(origin), oy = py(origin);

  // 4. Reconstruir polígonos projetados relativos ao observador (0,0)
  const projPolys = [];
  let idx = 0;
  if (allGeo.length > 0) {
    for (const { rings } of meta) {
      const projRings = [];
      for (const ring of rings) {
        projRings.push(ring.map(() => {
          const p = projPts[idx++];
          return [px(p)-ox, py(p)-oy];
        }));
      }
      projPolys.push(projRings);
    }
  }

  // 5. Extrair segmentos de paredes
  setStatus('compute', 'Extraindo paredes...');
  const segs = extractSegs(projPolys, S.radius * 1.5);

  // 6. Raycasting
  const is360 = S.cone >= 359.9;
  const half  = S.cone / 2;
  const angles = [];
  for (let a = is360 ? 0 : S.coneDir-half; a < (is360 ? 360 : S.coneDir+half); a += RAY_STEP) angles.push(a);
  if (!is360) angles.push(S.coneDir+half);
  S.rayCount = angles.length;

  setStatus('compute', `Disparando ${angles.length} raios...`);
  const rayPts = angles.map(a => castRay(a, S.radius, segs));

  // 7. Converter raios de volta para geo
  setStatus('compute', 'Convertendo coordenadas...');
  const absRay  = rayPts.map(([x,y]) => [x+ox, y+oy]);
  let geoRay;
  try {
    geoRay = await rpc.invoke('fromProjected', [origin, absRay]);
  } catch(e) {
    setStatus('error', 'Erro ao converter coordenadas: ' + e);
    return;
  }

  // Polígono de visibilidade
  const visPoly = is360
    ? [...geoRay, geoRay[0]]
    : [obs, ...geoRay, obs];
  const visTurf = turf.polygon([[...visPoly, visPoly[0]]]);

  // 8. Fatiar por distância
  setStatus('compute', 'Fatiando faixas...');
  const sorted = [...S.bands].sort((a,b) => a.dist-b.dist);
  sorted[sorted.length-1].dist = S.radius;
  const obsP     = turf.point(obs);
  let prevBuf    = null;
  const bandGeos = [];

  for (let bi = 0; bi < sorted.length; bi++) {
    const band   = sorted[bi];
    const circle = turf.buffer(obsP, band.dist/1000, { units:'kilometers', steps:64 });
    let shape = null;
    try { shape = turf.intersect(turf.featureCollection([visTurf, circle])); } catch {}
    if (!shape) continue;
    if (prevBuf && bi > 0) {
      try { const r = turf.difference(turf.featureCollection([shape, prevBuf])); if(r) shape=r; } catch {}
    }
    shape.properties = { band:band.label, color:band.color, opacity:band.opacity };
    bandGeos.push({ shape, band });
    try { prevBuf = turf.intersect(turf.featureCollection([visTurf, circle])); } catch { prevBuf=null; }
  }

  // 9. Renderizar no mapa
  setStatus('compute', 'Renderizando...');
  for (let bi = 0; bi < bandGeos.length; bi++) {
    const { shape, band } = bandGeos[bi];
    const fc = { type:'FeatureCollection', features:[shape] };
    const fillS = {type:'fill', paint:{'fill-color':band.color,'fill-opacity':band.opacity}};
    const lineS = {type:'line', paint:{'line-color':band.color,'line-width':1.2,'line-opacity':Math.min(band.opacity+0.2,1)}};
    for (const [nm,st] of [[`${LAYER_OUT}_f${bi}`,fillS],[`${LAYER_OUT}_l${bi}`,lineS]]) {
      try { await rpc.invoke('updateTempLayerGeoJSON',[nm,fc]); }
      catch { try { await rpc.invoke('addTempLayerGeoJSON',[nm,fc,st]); } catch {} }
    }
  }
  // Observer point
  const obsFC = {type:'FeatureCollection',features:[turf.point(obs)]};
  const obsSt = {type:'circle',paint:{'circle-color':'#fff','circle-radius':6,'circle-stroke-color':'#000','circle-stroke-width':2}};
  try { await rpc.invoke('updateTempLayerGeoJSON',[`${LAYER_OUT}_obs`,obsFC]); }
  catch { try { await rpc.invoke('addTempLayerGeoJSON',[`${LAYER_OUT}_obs`,obsFC,obsSt]); } catch {} }
}

// ─── Clear ────────────────────────────────────────────────────────────────────
async function clearLayers() {
  for (let i=0;i<S.bands.length;i++) {
    try { await rpc.invoke('removeTempLayer',[`${LAYER_OUT}_f${i}`]); } catch {}
    try { await rpc.invoke('removeTempLayer',[`${LAYER_OUT}_l${i}`]); } catch {}
  }
  try { await rpc.invoke('removeTempLayer',[`${LAYER_OUT}_obs`]); } catch {}
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function setStatus(s, msg) {
  S.status = s; S.statusMsg = msg;
  const bar = document.getElementById('sb');
  const ico = document.getElementById('si');
  const txt = document.getElementById('st');
  if (!bar) return;
  bar.className = 'status ' + s;
  if (s === 'idle')    bar.className = 'status hidden';
  if (s === 'waiting') { ico.className='pulse'; txt.textContent=msg; }
  if (s === 'compute') { ico.className='spinner'; txt.textContent=msg; }
  if (s === 'done')    { ico.className=''; ico.textContent='✓'; txt.textContent=msg; }
  if (s === 'error')   { ico.className=''; ico.textContent='⚠'; txt.textContent=msg; }
}

function renderObserver() {
  const c = document.getElementById('obs-card');
  const v = document.getElementById('obs-val');
  const l = document.getElementById('obs-lbl-txt');
  if (!c) return;
  if (S.observer) {
    c.className = 'obs-card visible';
    v.textContent = `${S.observer[1].toFixed(5)}, ${S.observer[0].toFixed(5)}`;
    l.textContent = S.observerLabel;
  } else {
    c.className = 'obs-card';
  }
}

function renderButtons() {
  const btnPt  = document.getElementById('btn-point');
  const btnSel = document.getElementById('btn-sel');
  const btnClr = document.getElementById('btn-clear');
  if (S.status === 'waiting') {
    btnPt.className = 'btn btn-cancel';
    btnPt.innerHTML = '<span class="pulse"></span> Clique no mapa...';
    btnPt.disabled  = false;
    btnSel.disabled = true;
  } else if (S.status === 'compute') {
    btnPt.disabled  = true;
    btnSel.disabled = true;
  } else {
    btnPt.className = 'btn btn-primary';
    btnPt.innerHTML = '◎ Observar de um ponto no mapa';
    btnPt.disabled  = false;
    btnSel.disabled = false;
  }
  btnClr.style.display = (S.status==='done'||S.status==='error') ? '' : 'none';
}

function renderInfo() {
  const el = document.getElementById('info-obstacles');
  const raw = giraffeState.get('rawSections') || [];
  const polys = raw.filter(f =>
    (f.geometry?.type === 'Polygon' || f.geometry?.type === 'MultiPolygon')
    && !(f?.properties?.layerId || '').startsWith(LAYER_OUT)
  );
  // Listar layers únicos
  const layerSet = new Set();
  polys.forEach(f => { const l = f?.properties?.layerId; if(l) layerSet.add(l); });
  if (el) {
    el.innerHTML = `
      <div class="info-row"><span class="info-lbl">Polígonos no projeto:</span><span class="info-val accent">${polys.length}</span></div>
      <div class="info-row"><span class="info-lbl">Layers detectados:</span><span class="info-val">${[...layerSet].join(', ') || 'nenhum'}</span></div>
    `;
  }
}

function scheduleRecompute() {
  if (!S.observer) return;
  clearTimeout(debounce);
  debounce = setTimeout(async () => {
    const t0 = performance.now();
    await computeIsovist();
    S.computeMs = Math.round(performance.now()-t0);
    setStatus('done', `${S.rayCount} raios · ${S.obstacleCount} obstáculos · ${S.computeMs}ms`);
    renderButtons();
  }, 300);
}

// ─── Ações: colocar observador ────────────────────────────────────────────────
async function fromSelectedBuilding() {
  if (S.status === 'compute') return;
  setStatus('compute', 'Lendo edifício selecionado...');
  renderButtons();

  try {
    const result = await rpc.invoke('getSelectedFeatures', []);
    const feats  = result?.features || result || [];
    if (feats.length === 0) {
      setStatus('error', 'Nenhum elemento selecionado. Selecione um edifício no mapa antes.');
      renderButtons();
      return;
    }

    const feat = feats[0];
    // Centroide do polígono selecionado
    let centroid;
    if (feat.geometry?.type === 'Polygon' || feat.geometry?.type === 'MultiPolygon') {
      const c = turf.centroid(feat);
      centroid = c.geometry.coordinates;
    } else if (feat.geometry?.type === 'Point') {
      centroid = feat.geometry.coordinates;
    } else {
      setStatus('error', 'O elemento selecionado não é um polígono ou ponto.');
      renderButtons();
      return;
    }

    S.observer = [centroid[0], centroid[1]];
    S.observerLabel = 'Edifício selecionado';
    S.observerFeatureId = feat?.properties?.id || null;
    renderObserver();

    const t0 = performance.now();
    await computeIsovist();
    S.computeMs = Math.round(performance.now()-t0);
    setStatus('done', `${S.rayCount} raios · ${S.obstacleCount} obstáculos · ${S.computeMs}ms`);
  } catch(e) {
    console.error('[Isovist]', e);
    setStatus('error', String(e));
  }
  renderButtons();
}

async function fromMapClick() {
  if (S.status === 'compute') return;
  if (S.status === 'waiting') {
    isListening = false;
    setStatus('idle', '');
    renderButtons();
    return;
  }
  isListening = true;
  S.observerFeatureId = null;
  setStatus('waiting', 'Clique em qualquer ponto do mapa...');
  renderButtons();

  try {
    const pt = await rpc.invoke('drawPoint', []);
    if (!isListening) return;
    if (pt) {
      isListening = false;
      S.observer = Array.isArray(pt) ? pt : [pt.lng ?? pt[0], pt.lat ?? pt[1]];
      S.observerLabel = 'Ponto no mapa';
      renderObserver();
      const t0 = performance.now();
      await computeIsovist();
      S.computeMs = Math.round(performance.now()-t0);
      setStatus('done', `${S.rayCount} raios · ${S.obstacleCount} obstáculos · ${S.computeMs}ms`);
      renderButtons();
    }
  } catch {
    console.warn('[Isovist] drawPoint indisponível — aguardando mapSelectCoord');
  }
}

async function clearAll() {
  clearTimeout(debounce);
  S.status='idle'; S.observer=null; S.statusMsg=''; S.computeMs=null; S.observerFeatureId=null;
  setStatus('idle',''); renderObserver(); renderButtons();
  await clearLayers();
}

// ─── Build DOM ────────────────────────────────────────────────────────────────
document.getElementById('root').innerHTML = `
<div class="app">
  <header class="hdr">
    <span class="hdr-ico">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
        <path d="M10 10 L18 5"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
        <path d="M10 10 L17 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
        <path d="M10 10 L14 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>
        <path d="M10 10 L5 17"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M10 10 L2 10"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".2"/>
        <path d="M10 10 L5 2"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M10 10 L13 1"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".45"/>
      </svg>
    </span>
    <div><div class="hdr-t">Isovist / View Rose</div><div class="hdr-sub">Análise de campo visual urbano</div></div>
  </header>

  <div class="status hidden" id="sb"><span id="si"></span><span id="st"></span></div>

  <div class="obs-card" id="obs-card">
    <span class="obs-lbl" id="obs-lbl-txt">Observador</span>
    <span class="obs-val" id="obs-val">—</span>
  </div>

  <div class="controls">

    <div class="divider"><span>Ponto de observação</span></div>

    <button class="btn btn-sel" id="btn-sel">⊙ Observar do edifício selecionado</button>
    <button class="btn btn-primary" id="btn-point">◎ Observar de um ponto no mapa</button>
    <button class="btn btn-clear btn-sm" id="btn-clear" style="display:none">✕ Limpar análise</button>

    <div class="divider"><span>Obstáculos detectados</span></div>
    <div class="info-box" id="info-obstacles">
      <div class="info-row"><span class="info-lbl">Carregando...</span></div>
    </div>

    <div class="divider"><span>Parâmetros</span></div>

    <div class="sl-grp">
      <div class="sl-row"><span class="sl-lbl">Raio máximo</span><span class="sl-val" id="lbl-r">300m</span></div>
      <input type="range" id="sl-r" min="50" max="1000" step="25" value="300"/>
      <div class="sl-ticks"><span>50m</span><span>500m</span><span>1km</span></div>
    </div>

    <div class="sl-grp">
      <div class="sl-row"><span class="sl-lbl">Abertura do cone</span><span class="sl-val" id="lbl-c">360° (View Rose)</span></div>
      <input type="range" id="sl-c" min="10" max="360" step="5" value="360"/>
      <div class="sl-ticks"><span>10°</span><span>180°</span><span>360°</span></div>
    </div>

    <div class="sl-grp" id="grp-dir" style="display:none">
      <div class="sl-row"><span class="sl-lbl">Direção do cone</span><span class="sl-val" id="lbl-d">0°</span></div>
      <input type="range" id="sl-d" min="0" max="355" step="5" value="0"/>
      <div class="sl-ticks"><span>E</span><span>N/S</span><span>W</span></div>
    </div>

    <div class="divider"><span>Faixas de distância</span></div>
    <div id="bands-wrap"></div>

  </div>

  <footer class="ftr"><p>Raycasting 2° · Turf.js · Giraffe iFrame SDK · <strong style="color:#00ACCD">v8</strong></p></footer>
</div>`;

// ── Wire controls ────────────────────────────────────────────────────────────
document.getElementById('btn-sel').addEventListener('click', fromSelectedBuilding);
document.getElementById('btn-point').addEventListener('click', fromMapClick);
document.getElementById('btn-clear').addEventListener('click', clearAll);

document.getElementById('sl-r').addEventListener('input', e => {
  S.radius = +e.target.value;
  document.getElementById('lbl-r').textContent = S.radius + 'm';
  const ld = document.getElementById(`bd-${S.bands.length-1}`); if(ld) ld.value = S.radius;
  scheduleRecompute();
});
document.getElementById('sl-c').addEventListener('input', e => {
  S.cone = +e.target.value;
  const is360 = S.cone >= 359.9;
  document.getElementById('lbl-c').textContent = is360 ? '360° (View Rose)' : S.cone + '°';
  document.getElementById('grp-dir').style.display = is360 ? 'none' : '';
  scheduleRecompute();
});
document.getElementById('sl-d').addEventListener('input', e => {
  S.coneDir = +e.target.value;
  document.getElementById('lbl-d').textContent = S.coneDir + '°';
  scheduleRecompute();
});

// Faixas de distância
const wrap = document.getElementById('bands-wrap');
S.bands.forEach((band, i) => {
  const isLast = i === S.bands.length-1;
  const card = document.createElement('div'); card.className='band-card';
  card.innerHTML = `
    <div class="band-hdr">
      <div class="swatch" id="sw-${i}" style="background:${band.color}"></div>
      <span class="band-name">${band.label}</span>
      <input type="color" id="bc-${i}" value="${band.color}"/>
    </div>
    <div class="brow">
      <span class="bmeta">Limite</span>
      <input type="number" id="bd-${i}" value="${isLast?S.radius:band.dist}" min="10" max="${S.radius}" step="10" ${isLast?'disabled':''}/>
      <span class="bmeta">m · Op.</span>
      <input type="range" id="bo-${i}" class="thin" min=".05" max=".85" step=".05" value="${band.opacity}" style="flex:1"/>
      <span class="bmeta" id="bol-${i}">${Math.round(band.opacity*100)}%</span>
    </div>`;
  wrap.appendChild(card);
  document.getElementById(`bc-${i}`).addEventListener('input', e => {
    S.bands[i].color = e.target.value;
    document.getElementById(`sw-${i}`).style.background = e.target.value;
    scheduleRecompute();
  });
  if (!isLast) document.getElementById(`bd-${i}`).addEventListener('change', e => {
    S.bands[i].dist = +e.target.value; scheduleRecompute();
  });
  document.getElementById(`bo-${i}`).addEventListener('input', e => {
    S.bands[i].opacity = +e.target.value;
    document.getElementById(`bol-${i}`).textContent = Math.round(+e.target.value*100)+'%';
    scheduleRecompute();
  });
});

// ── Listeners SDK ────────────────────────────────────────────────────────────
// Fallback para mapSelectCoord (quando drawPoint não está disponível)
giraffeState.addListener(['mapSelectCoord'], async () => {
  if (!isListening) return;
  const coord = giraffeState.get('mapSelectCoord');
  if (!coord) return;
  isListening = false;
  S.observer = Array.isArray(coord) ? coord : [coord.lng, coord.lat];
  S.observerLabel = 'Ponto no mapa';
  S.observerFeatureId = null;
  renderObserver();
  const t0 = performance.now();
  await computeIsovist();
  S.computeMs = Math.round(performance.now()-t0);
  setStatus('done', `${S.rayCount} raios · ${S.obstacleCount} obstáculos · ${S.computeMs}ms`);
  renderButtons();
});

// Atualiza info de obstáculos quando o projeto muda
giraffeState.addListener(['rawSections'], () => renderInfo());

// ── Init ──────────────────────────────────────────────────────────────────────
renderInfo();

</script>
</body>
</html>
